name: pagaoa_mobprog
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies: 
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.1
  flutter:
    sdk: flutter
  # important!
  flutter_screenutil: ^5.9.3
  intl: ^0.20.2
  shared_preferences: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/images/

  fonts:
    - family: Klavika
      fonts:
        - asset: assets/fonts/klavika-bold.otf
    - family: Frutiger
      fonts:
        - asset: assets/fonts/FrutigerLTStd Roman.otf
  uses-material-design: true
